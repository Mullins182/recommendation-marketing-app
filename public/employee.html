<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>Mitarbeiterbereich | Gutscheinprüfung</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
          <div class="card p-4">
            <h1 class="h4 mb-3">Mitarbeiterbereich</h1>

            <form id="loginForm" class="row g-2 align-items-end">
              <div class="col-8 col-md-4">
                <label class="form-label">PIN</label>
                <input type="password" id="pin" class="form-control" required />
              </div>
              <div class="col-4 col-md-3">
                <button class="btn btn-primary w-100" type="submit">
                  Login
                </button>
              </div>
              <input type="hidden" id="csrf" />
            </form>

            <div id="loginMsg" class="alert d-none mt-3"></div>

            <!-- Scanner-Area -->
            <div id="scannerArea" class="d-none employee-mobile">
              <div class="video-wrap">
                <video id="video" playsinline muted></video>
              </div>

              <div id="scanResult" class="alert d-none" role="alert"></div>

              <form id="redeemForm" class="d-none" autocomplete="off">
                <input
                  id="voucherCode"
                  class="form-control"
                  placeholder="Gescannten Code"
                />
                <button type="submit" class="btn btn-success">Einlösen</button>
              </form>

              <!-- Buttons: links Start/Stop, rechts Abbrechen -->
              <div class="button-row spacer-push">
                <button id="toggleScan" class="btn btn-primary">
                  Kamera starten
                </button>
                <button id="cancelBtn" class="btn btn-outline-secondary d-none">
                  Abbrechen & zurück
                </button>
              </div>

              <button id="newScanBtn" class="btn btn-primary d-none mt-2">
                Neuen Scan starten
              </button>
            </div>

            <!-- <a href="index.html" class="btn btn-link mt-4">Zur Registrierung</a> -->
          </div>
        </div>
      </div>
    </div>

    <script src="js/employee.js" type="module"></script>
  </body>
</html>
