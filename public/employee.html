<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>Mitarbeiterbereich | Gutscheinprüfung</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
          <div class="card p-4">
            <h1 class="h4 mb-3">Mitarbeiterbereich</h1>

            <form id="loginForm" class="row g-2 align-items-end">
              <div class="col-8 col-md-4">
                <label class="form-label">PIN</label>
                <input type="password" id="pin" class="form-control" required />
              </div>
              <div class="col-4 col-md-3">
                <button class="btn btn-primary w-100" type="submit">
                  Login
                </button>
              </div>
              <input type="hidden" id="csrf" />
            </form>

            <div id="loginMsg" class="alert d-none mt-3"></div>

            <div id="scannerArea" class="mt-4 d-none">
              <h2 class="h5">QR-Code scannen</h2>
              <video
                id="video"
                playsinline
                style="width: 100%; max-height: 320px; background: #000"
              ></video>
              <div class="mt-2">
                <button id="toggleScan" class="btn btn-outline-primary">
                  Kamera starten
                </button>
              </div>

              <div id="scanResult" class="alert mt-3 d-none"></div>

              <form id="redeemForm" class="row g-2 align-items-end mt-3 d-none">
                <div class="col-12 col-md-8">
                  <label class="form-label">Gutscheincode</label>
                  <input
                    type="text"
                    id="voucherCode"
                    class="form-control"
                    required
                  />
                </div>
                <div class="col-6 col-md-2">
                  <button class="btn btn-success w-100" type="submit">
                    Einlösen
                  </button>
                </div>
              </form>
            </div>

            <a href="index.html" class="btn btn-link mt-4">Zur Registrierung</a>
          </div>
        </div>
      </div>
    </div>

    <script src="js/employee.js" type="module"></script>
  </body>
</html>
