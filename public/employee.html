<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>Gutscheinprüfung</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <noscript
      ><div class="container py-3">
        <div class="alert alert-danger">
          Diese Anwendung benötigt JavaScript.
        </div>
      </div></noscript
    >

    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
          <div class="card p-4">
            <h1 class="h4 mb-3">Mitarbeiter-Login</h1>

            <form id="loginForm" class="row g-2 align-items-end">
              <div class="col-8 col-md-4">
                <label for="pin" class="form-label">PIN</label>
                <input type="password" id="pin" class="form-control" required />
              </div>
              <div class="col-4 col-md-3">
                <button class="btn btn-primary w-100" type="submit">
                  Login
                </button>
              </div>
              <input type="hidden" id="csrf" />
            </form>

            <div
              id="loginMsg"
              class="alert d-none mt-3"
              role="status"
              aria-live="polite"
            ></div>

            <!-- Scanner -->
            <div id="scannerArea" class="d-none employee-mobile">
              <div class="video-wrap">
                <video id="video" playsinline muted></video>
              </div>

              <div
                id="scanResult"
                class="alert d-none"
                role="status"
                aria-live="polite"
              ></div>

              <form id="redeemForm" class="d-none" autocomplete="off">
                <input
                  id="voucherCode"
                  class="form-control"
                  placeholder="Gescannten Code"
                />
                <button type="submit" class="btn btn-success">
                  Gutschein prüfen
                </button>
              </form>

              <div class="button-row spacer-push">
                <button id="toggleScan" class="btn btn-primary">
                  QR-Scan starten
                </button>
                <button id="logoutBtn" class="btn btn-outline-secondary d-none">
                  Logout
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="js/employee.js" type="module"></script>
  </body>
</html>
