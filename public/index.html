<!DOCTYPE html>
<html lang="de">
  <head>
    <!------------------------------------ Affiliate App v1.0 ------------------------------------>
    <meta charset="utf-8" />
    <title>Affiliate App (Arbeitstitel)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <noscript
      ><div class="container py-3">
        <div class="alert alert-danger">
          Diese Anwendung benötigt JavaScript.
        </div>
      </div></noscript
    >

    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
          <div class="card p-4">
            <h1 class="h4 mb-2">
              Affiliate App (Arbeitstitel / Working title)
            </h1>
            <h1 class="h4 mb-2">Jetzt mit deiner E-Mail registrieren</h1>
            <p class="text-muted mb-3">
              Teile deinen Empfehlungslink und erhalte Gutscheine!
            </p>

            <form id="registerForm" class="needs-validation" novalidate>
              <div class="mb-3">
                <label for="email" class="form-label">E-Mail-Adresse</label>
                <input
                  type="email"
                  class="form-control"
                  id="email"
                  placeholder="name@example.com"
                  required
                />
                <div class="invalid-feedback">
                  Bitte gib eine gültige E-Mail ein.
                </div>
              </div>

              <input type="hidden" id="ref" />
              <input type="hidden" id="csrf" />

              <button class="btn btn-primary w-100" type="submit">
                Registrieren
              </button>
            </form>

            <div
              id="result"
              class="alert mt-3 d-none"
              role="status"
              aria-live="polite"
            ></div>

            <hr class="my-4" />
            <h2 class="h5">Dein Empfehlungslink</h2>
            <p class="text-muted">
              Nach der Registrierung erhältst du deinen persönlichen Link und
              einen QR-Code per E-Mail.
            </p>

            <!-- <a href="employee.html" class="btn btn-outline-secondary w-100 mt-3"
              >Mitarbeiterbereich</a
            > -->
          </div>
        </div>
      </div>
    </div>

    <script src="js/app.js" type="module"></script>
  </body>
</html>
